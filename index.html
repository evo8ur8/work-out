<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recomp Rebuild Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0d0d0f; --surface:#151518; --surface2:#1c1c21; --border:#2a2a32;
    --accent:#e8ff47; --accent2:#ff6b35; --accent3:#47d4ff;
    --text:#f0f0f0; --muted:#6b6b7a; --danger:#ff4757; --success:#2ecc71; --deload:#8e44ad;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}

  /* HEADER */
  .hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between}
  .hdr-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)}
  .wk-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;color:var(--muted)}
  .wk-badge span{color:var(--text)}

  /* WEEK NAV */
  .wk-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 20px;border-bottom:1px solid var(--border)}
  .wk-dots{display:flex;gap:6px}
  .wk-dot{width:28px;height:6px;border-radius:3px;background:var(--border);cursor:pointer;transition:background .2s}
  .wk-dot.active{background:var(--accent)}
  .wk-dot.done{background:var(--success);opacity:.7}
  .wk-dot.deload-wk{background:var(--deload);opacity:.5}
  .wk-dot.deload-wk.active{background:var(--deload);opacity:1}
  .nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* BLOCK BADGE */
  .block-strip{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 20px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
  .block-pill{padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.5px}
  .block-pill.A{background:rgba(232,255,71,.15);color:var(--accent)}
  .block-pill.B{background:rgba(71,212,255,.15);color:var(--accent3)}
  .block-pill.deload{background:rgba(142,68,173,.2);color:var(--deload)}

  /* DAY PILLS */
  .day-scroll{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
  .day-scroll::-webkit-scrollbar{display:none}
  .day-pill{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;white-space:nowrap}
  .day-pill.active{background:var(--accent);color:#0d0d0f;border-color:var(--accent)}
  .day-pill.done{border-color:var(--success);color:var(--success)}
  .day-pill.rest{border-style:dashed}

  /* CONTENT */
  .content{padding:0 20px 110px}
  .day-hdr{padding:20px 0 6px;display:flex;align-items:flex-start;justify-content:space-between}
  .day-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1}
  .day-sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300}

  /* RING */
  .ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
  .ring-svg{transform:rotate(-90deg)}
  .ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}

  /* STAT GRID */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent)}
  .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .prog-wrap{background:var(--border);border-radius:4px;height:6px;margin-top:10px;overflow:hidden}
  .prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}

  /* SECTION LABEL */
  .sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
  .sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

  /* DELOAD BANNER */
  .deload-banner{background:rgba(142,68,173,.1);border:1.5px solid var(--deload);border-radius:14px;padding:16px;margin-top:14px}
  .deload-banner-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--deload);display:flex;align-items:center;gap:8px}
  .deload-banner-sub{font-size:12px;color:var(--text);margin-top:6px;line-height:1.6}

  /* ROTATION BANNER */
  .rotation-banner{background:rgba(71,212,255,.08);border:1px solid rgba(71,212,255,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--accent3);margin-top:12px;line-height:1.6}

  /* EXERCISE ROW */
  .ex-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;transition:all .15s;user-select:none;margin-bottom:6px}
  .ex-row.checked{background:rgba(232,255,71,.06);border-color:rgba(232,255,71,.3)}
  .ex-row.deload-row{border-color:rgba(142,68,173,.3)}
  .ex-row.deload-row.checked{background:rgba(142,68,173,.08);border-color:rgba(142,68,173,.4)}
  .ex-top{display:flex;align-items:flex-start;gap:12px;cursor:pointer}
  .ex-top:active{opacity:.85}
  .chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
  .ex-row.checked .chk-box{background:var(--accent);border-color:var(--accent)}
  .ex-row.deload-row.checked .chk-box{background:var(--deload);border-color:var(--deload)}
  .chk-icon{display:none;font-size:13px;color:#0d0d0f;font-weight:900}
  .ex-row.checked .chk-icon{display:block}
  .ex-info{flex:1;min-width:0}
  .ex-name{font-size:15px;font-weight:500;transition:color .15s}
  .ex-row.checked .ex-name{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(232,255,71,.4)}
  .ex-meta{font-size:12px;color:var(--accent2);margin-top:2px;font-weight:500}
  .ex-new-badge{display:inline-block;font-size:9px;font-weight:700;background:rgba(71,212,255,.2);color:var(--accent3);padding:1px 6px;border-radius:8px;margin-left:6px;letter-spacing:.3px;vertical-align:middle}
  .ex-detail{font-size:12px;color:var(--muted);margin-top:2px;font-weight:300}

  /* HOW TO PANEL */
  .howto-btn{font-size:11px;color:var(--accent3);margin-top:6px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;letter-spacing:.3px;border:none;background:none;padding:0}
  .howto-panel{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:8px}
  .howto-panel.open{display:block}
  .howto-panel p{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:8px}
  .howto-panel p:last-child{margin-bottom:0}
  .howto-panel strong{color:var(--accent);font-weight:600}
  .howto-panel .feel{background:rgba(232,255,71,.07);border-left:3px solid var(--accent);padding:8px 10px;border-radius:0 6px 6px 0;font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6}
  .howto-panel .band-note{background:rgba(71,212,255,.07);border-left:3px solid var(--accent3);padding:8px 10px;border-radius:0 6px 6px 0;font-size:12px;color:var(--accent3);margin-top:8px;line-height:1.6}
  .howto-panel .bench-note{background:rgba(255,107,53,.07);border-left:3px solid var(--accent2);padding:8px 10px;border-radius:0 6px 6px 0;font-size:12px;color:var(--accent2);margin-top:8px;line-height:1.6}

  /* SET DOTS */
  .set-dots{display:flex;gap:4px;flex-shrink:0;padding-top:4px}
  .set-dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .15s}
  .set-dot.done{background:var(--accent)}

  /* WEIGHT LOG */
  .weight-log{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .weight-log-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .weight-log-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .weight-trend{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
  .weight-trend.up{background:rgba(46,204,113,.15);color:var(--success)}
  .weight-trend.same{background:rgba(107,107,122,.15);color:var(--muted)}
  .weight-trend.first{background:rgba(71,212,255,.15);color:var(--accent3)}
  .weight-trend.deload-trend{background:rgba(142,68,173,.15);color:var(--deload)}
  .weight-trend.suggested{background:rgba(232,255,71,.15);color:var(--accent)}
  .weight-input-row{display:flex;align-items:center;gap:8px}
  .weight-stepper{display:flex;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
  .weight-step-btn{background:none;border:none;color:var(--text);font-size:16px;font-weight:700;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
  .weight-step-btn:active{background:rgba(232,255,71,.15)}
  .weight-val-box{min-width:54px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--accent)}
  .weight-unit{font-size:11px;color:var(--muted);font-weight:600}
  .weight-last{font-size:11px;color:var(--muted);margin-left:auto;font-weight:300}
  .weight-suggest-row{font-size:11px;color:var(--accent3);margin-top:6px;display:flex;align-items:center;gap:6px}

  /* CARDIO */
  .cardio-row{padding:12px 14px;background:var(--surface);border:1.5px solid var(--accent3);border-radius:12px;display:flex;align-items:center;justify-content:space-between;margin-top:6px;cursor:pointer}
  .cardio-lbl{font-size:14px;font-weight:500;color:var(--accent3)}
  .cardio-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .cardio-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--accent3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .cardio-chk.done{background:var(--accent3)}

  /* ENERGY */
  .energy-bar{display:flex;gap:8px;margin:12px 0 18px}
  .energy-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .energy-btn{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}

  /* PERF LOG */
  .perf-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-top:8px}
  .perf-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .perf-row:last-child{margin-bottom:0}
  .perf-key{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .diff-slider{-webkit-appearance:none;appearance:none;width:130px;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer;accent-color:var(--accent)}
  .diff-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer}
  .diff-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);min-width:24px;text-align:right}
  .effort-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .effort-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  .effort-btn.sel{background:rgba(232,255,71,.15);border-color:var(--accent);color:var(--accent)}
  .win-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:8px 12px;width:100%;margin-top:10px;outline:none}
  .win-input:focus{border-color:var(--accent)}
  .win-input::placeholder{color:var(--muted)}

  /* REST */
  .rest-card{margin-top:24px;padding:32px 20px;text-align:center;background:var(--surface);border:1.5px solid var(--border);border-radius:16px}

  /* TIP */
  .tip-box{background:rgba(71,212,255,.07);border:1px solid rgba(71,212,255,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--accent3);margin-top:12px;line-height:1.6}

  /* BAND LEGEND */
  .band-legend{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:8px}
  .band-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .band-row:last-child{margin-bottom:0}
  .band-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .band-info{font-size:12px;line-height:1.5}
  .band-name{font-weight:600;color:var(--text)}
  .band-use{color:var(--muted);font-weight:300}

  /* DUMBBELL LEGEND */
  .db-legend{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .db-card{text-align:center;padding:8px 4px;background:var(--surface2);border-radius:8px}
  .db-w{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
  .db-u{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}

  /* WEIGHT PROGRESS MODAL */
  .progress-toggle{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;padding:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--accent3)}
  .progress-modal{display:none;position:fixed;inset:0;background:rgba(13,13,15,.92);z-index:300;overflow-y:auto}
  .progress-modal.open{display:block}
  .progress-modal-inner{max-width:430px;margin:0 auto;padding:20px}
  .progress-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding-bottom:10px}
  .progress-close button{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:32px;height:32px;font-size:16px;cursor:pointer}
  .progress-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent);margin-bottom:16px}
  .ex-progress-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .ex-progress-name{font-size:14px;font-weight:600;margin-bottom:8px}
  .ex-progress-chart{display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:6px}
  .ex-progress-bar{flex:1;background:var(--border);border-radius:3px 3px 0 0;position:relative;min-height:4px;transition:height .3s}
  .ex-progress-bar.has-data{background:var(--accent)}
  .ex-progress-bar.deload-bar.has-data{background:var(--deload)}
  .ex-progress-labels{display:flex;gap:4px;font-size:9px;color:var(--muted)}
  .ex-progress-labels span{flex:1;text-align:center}
  .ex-progress-summary{font-size:11px;color:var(--muted);margin-top:6px}
  .ex-progress-summary strong{color:var(--success)}

  /* BOTTOM BAR */
  .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 20px 24px;background:linear-gradient(to top,var(--bg) 70%,transparent);display:flex;gap:10px}
  .btn-primary{flex:1;padding:14px;border-radius:12px;background:var(--accent);color:#0d0d0f;font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer}
  .btn-secondary{padding:14px 18px;border-radius:12px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}

  /* TOAST */
  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);opacity:0;pointer-events:none;transition:all .25s;z-index:400;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="hdr">
  <div class="hdr-title">RECOMP REBUILD</div>
  <div class="wk-badge">Week <span id="hdr-wk">1</span> of 8</div>
</div>

<div class="wk-nav">
  <button class="nav-btn" id="btn-pw">‹</button>
  <div class="wk-dots" id="wk-dots"></div>
  <button class="nav-btn" id="btn-nw">›</button>
</div>

<div class="block-strip" id="block-strip"></div>

<div class="day-scroll" id="day-pills"></div>
<div class="content" id="content"></div>

<div class="progress-modal" id="progress-modal">
  <div class="progress-modal-inner">
    <div class="progress-close"><button onclick="closeProgress()">✕</button></div>
    <div class="progress-title">WEIGHT PROGRESS</div>
    <div id="progress-body"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-secondary" id="btn-pd">← Back</button>
  <button class="btn-primary" id="btn-nd">Next Day →</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// PROGRAM DESIGN NOTES
// Based on research: systematic exercise rotation (not random "muscle
// confusion") every 2 weeks produces better regional hypertrophy than
// staying static the whole 8 weeks (Kassiano et al. 2022, JSCR;
// Krzysztofik et al. PLOS ONE). Excessive/random rotation hurts progress,
// so each exercise has exactly ONE planned swap, not constant change.
//
// Structure: two 4-week mesocycles, each split into 2-week microcycles.
//   Weeks 1-2  = Block A (baseline movement pool)
//   Week 3-4   = Block B (rotated variation pool) -- week 4 is a deload
//   Weeks 5-6  = Block A again, heavier than weeks 1-2
//   Week 7-8   = Block B again, heavier than weeks 3-4 -- week 8 deload
// Deload = 70-80% of recent working weight, sets reduced, no failure sets
// (Legion/NASM/Cleveland Clinic deload guidance: 40-50% load or 70-80%
// load + reduced volume, every 4-8 weeks for intermediate lifters).
// ─────────────────────────────────────────────────────────────────────

const DUMBBELLS = [5,8,10,15,20,25];
const DELOAD_WEEKS = [4,8];

// returns 'A' or 'B' for a given week
function getBlock(week) {
  // weeks 1,2,5,6 = A | weeks 3,4,7,8 = B
  const wk4 = ((week-1) % 4) + 1; // 1..4 within the 4-wk mesocycle
  return (wk4 <= 2) ? 'A' : 'B';
}
function isDeloadWeek(week) { return DELOAD_WEEKS.includes(week); }

const DAYS = [
{
  id:1, label:'Day 1', title:'LOWER BODY', subtitle:'Glutes + Legs', color:'#e8ff47',
  warmup:[
    { name:'Vibration Plate', meta:'5 min', sets:0, trackWeight:false,
      how:'Stand on the vibration plate for 5 minutes to warm up joints and activate muscles. Light squats or just stand still. Primes your legs and glutes before loading weight.',
      feel:'Light vibration only — just a warm-up, no intensity needed.', band:null, bench:null }
  ],
  blockA:[
    { name:'Goblet Squat', meta:'4 sets × 10–12 reps', sets:4, trackWeight:true, startWeight:15,
      how:'Hold a dumbbell vertically at your chest with both hands, elbows pointing down. Feet shoulder-width, toes slightly out. Push your knees OUT against the band as you sit back and down — go as deep as you can with good form. Drive through your heels to stand. <strong>3 seconds down, 1 second pause at bottom, then up.</strong>',
      feel:'Quads burning, glutes engaging equally. Last 3–5 reps should feel like a slow grind.',
      band:'Medium band above knees. Move to Heavy once Medium feels easy.', bench:null },
    { name:'Bench Hip Thrust', meta:'4 sets × 12–15 reps', sets:4, trackWeight:true, startWeight:20,
      how:'Bench flat. Sit on the floor, upper back against the bench edge. Rest a dumbbell on your hip crease, holding it with both hands. Feet flat, hip-width apart. Drive hips straight UP, squeezing glutes HARD at the top. <strong>Hold 2–3 seconds at the top.</strong> Lower with control.',
      feel:'Glutes should do 90% of the work. If you feel it in your lower back, walk your feet slightly further out. This is your heaviest lift of the day.',
      band:'Heavy band above knees. X-Heavy in weeks 5–8 once Heavy feels manageable.', bench:'Flat bench, upper back resting on the edge, hips fully extending past the bench line at the top.' },

const emptyDay = () => ({exercises:{},sets:{},weights:{},energy:null,difficulty:5,effort:null,win:'',cardio:false,restChecks:{},recovery:{}});
const getKey = (w,d) => `w${w}d${d}`;
const getDayData = (w,d) => { const k=getKey(w,d); if(!ST.weeks[k]) ST.weeks[k]=emptyDay(); return ST.weeks[k]; };

// resolve which exercise list applies to a given day/week (handles warmup + block + circuit label)
function getDayExercises(dayDef, week) {
  const block = getBlock(week);
  const main = block === 'A' ? (dayDef.blockA || []) : (dayDef.blockB || []);
  return main;
}
function getAllSections(dayDef, week) {
  const sections = [];
  if (dayDef.warmup) sections.push({ name:'Warm-Up', exercises: dayDef.warmup });
  const main = getDayExercises(dayDef, week);
  const label = dayDef.circuitLabel || 'Main Work';
  sections.push({ name: label, exercises: main });
  return sections;
}

function isDayComplete(w,d) {
  const df=DAYS[d-1], data=getDayData(w,d);
  if(df.rest) return (df.restChecks||[]).every((_,i)=>data.restChecks[i]);
  if(df.recovery) return Object.values(data.recovery).some(Boolean);
  const sections = getAllSections(df, w);
  const all = sections.flatMap(s=>s.exercises).filter(e=>e.name!=='Vibration Plate');
  return all.length>0 && all.every(e=>data.exercises[e.name]);
}

// find the most recent logged weight for an exercise (by name), searching backward
function getLastWeight(exName, beforeWeek, beforeDay) {
  for (let w = beforeWeek; w >= 1; w--) {
    const maxDay = (w === beforeWeek) ? beforeDay - 1 : 7;
    for (let d = maxDay; d >= 1; d--) {
      const data = ST.weeks[getKey(w,d)];
      if (data && data.weights && data.weights[exName] != null) return { weight: data.weights[exName], week: w };
    }
  }
  return null;
}

// suggested weight for this week: bumps up on normal weeks, cuts to ~70-75% on deload weeks
function getSuggestedWeight(exName, week, day, startWeight) {
  const last = getLastWeight(exName, week, day);
  if (!last) return startWeight;
  if (isDeloadWeek(week)) {
    // 70-75% of the last logged weight, snapped down to the nearest dumbbell you actually own
    const target = last.weight * 0.725;
    const candidates = DUMBBELLS.filter(w => w <= target);
    return candidates.length ? candidates[candidates.length-1] : DUMBBELLS[0];
  }
  // coming off a deload week -> ramp back toward where they were pre-deload
  if (DELOAD_WEEKS.includes(last.week)) {
    // find weight from before that deload
    const preDeload = getLastWeight(exName, last.week, 1);
    if (preDeload) return preDeload.weight;
  }
  return last.weight; // hold steady as default; user bumps it themselves when ready
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── RENDER ──────────────────────────────────────────────────────────
function render() {
  document.getElementById('hdr-wk').textContent=ST.week;
  renderWeekDots();
  renderBlockStrip();
  renderDayPills();
  renderContent();
}

function renderWeekDots() {
  const el=document.getElementById('wk-dots'); el.innerHTML='';
  for(let w=1;w<=8;w++){
    const d=document.createElement('div');
    d.className='wk-dot';
    if (isDeloadWeek(w)) d.classList.add('deload-wk');
    if(w===ST.week) d.classList.add('active');
    else if([1,2,3,4,5,6,7].every(dd=>isDayComplete(w,dd))) d.classList.add('done');
    d.onclick=()=>{ST.week=w;ST.day=1;save();render();};
    el.appendChild(d);
  }
}

function renderBlockStrip() {
  const el = document.getElementById('block-strip');
  if (isDeloadWeek(ST.week)) {
    el.innerHTML = `<span class="block-pill deload">⚡ DELOAD WEEK</span> Lighter weight, full recovery focus`;
  } else {
    const block = getBlock(ST.week);
    el.innerHTML = `<span class="block-pill ${block}">BLOCK ${block}</span> ${block==='A' ? 'Baseline movements' : 'Rotated variations'} · Mesocycle ${ST.week<=4?'1':'2'} of 2`;
  }
}

function renderDayPills() {
  const el=document.getElementById('day-pills'); el.innerHTML='';
  DAYS.forEach((df,i)=>{
    const d=i+1, done=isDayComplete(ST.week,d), active=d===ST.day;
    const p=document.createElement('div');
    p.className='day-pill'+(df.rest?' rest':'')+(active?' active':done?' done':'');
    p.textContent=df.label+(done&&!active?' ✓':'');
    p.onclick=()=>{ST.day=d;save();render();window.scrollTo({top:0,behavior:'smooth'});};
    el.appendChild(p);
  });
  setTimeout(()=>{
    const a=el.querySelector('.day-pill.active');
    if(a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },60);
}

function renderContent() {
  const def=DAYS[ST.day-1], data=getDayData(ST.week,ST.day), el=document.getElementById('content');
  el.innerHTML='';
  const deload = isDeloadWeek(ST.week);
  const block = getBlock(ST.week);

  if (!def.rest && !def.recovery) {
    const sections = getAllSections(def, ST.week);
    const allEx = sections.flatMap(s=>s.exercises).filter(e=>e.name!=='Vibration Plate');
    const doneEx = allEx.filter(e=>data.exercises[e.name]).length;
    const pct = allEx.length ? doneEx/allEx.length : 0;
    const weekDone=[1,2,3,4,5,6,7].filter(d=>isDayComplete(ST.week,d)).length;
    const r=22, circ=2*Math.PI*r;

    el.innerHTML+=`<div class="day-hdr">
      <div>
        <div class="day-title" style="color:${def.color}">${def.title}</div>
        <div class="day-sub">${def.subtitle}</div>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" width="52" height="52">
          <circle cx="26" cy="26" r="${r}" fill="none" stroke="#2a2a32" stroke-width="4"/>
          <circle cx="26" cy="26" r="${r}" fill="none" stroke="${def.color}" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ-pct*circ}"
            style="transition:stroke-dashoffset .4s"/>
        </svg>
        <div class="ring-text">${Math.round(pct*100)}%</div>
      </div>
    </div>`;

    el.innerHTML+=`<div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val">${weekDone}/7</div>
        <div class="stat-lbl">Week ${ST.week} Days</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:${(weekDone/7)*100}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${def.color}">${doneEx}/${allEx.length}</div>
        <div class="stat-lbl">Today Done</div>
        <div class="prog-wrap"><div class="prog-fill" style="width:${pct*100}%;background:${def.color}"></div></div>
      </div>
    </div>`;

    el.innerHTML+=`<div class="progress-toggle" onclick="openProgress()">📈 View Weight Progress</div>`;

    if (deload) {
      el.innerHTML+=`<div class="deload-banner">
        <div class="deload-banner-title">⚡ DELOAD WEEK</div>
        <div class="deload-banner-sub">Same exercises, much lighter weight (~70–75% of last week). No sets to failure. Suggested weights below are pre-calculated for you — trust them even though it feels easy. This is what lets the last month of training actually turn into muscle.</div>
      </div>`;
    } else if (ST.week === 3 || ST.week === 7) {
      el.innerHTML+=`<div class="rotation-banner">🔄 <strong>New exercise rotation this week (Block B).</strong> Same muscle groups, different angles and movements to keep progressing. Weights reset slightly lower for new movements — that's expected, not a regression.</div>`;
    } else if (ST.week === 5) {
      el.innerHTML+=`<div class="rotation-banner">🔄 <strong>Back to Block A movements</strong> from weeks 1–2, now in your second mesocycle. You should be noticeably stronger this time through.</div>`;
    }
  }

  if(def.rest){
    el.innerHTML+=`<div class="rest-card">
      <div style="font-size:48px;margin-bottom:12px">😴</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#6b6b7a">REST DAY</div>
      <div style="font-size:13px;color:#6b6b7a;margin-top:8px;line-height:1.6">Muscle grows when you rest, not when you train.<br>This day is not optional.</div>
    </div>
    <div class="sec-lbl">Rest Day Checklist</div>`;
    def.restChecks.forEach((item,i)=>{
      const chk=!!data.restChecks[i];
      el.innerHTML+=`<div class="ex-row${chk?' checked':''}"><div class="ex-top" onclick="toggleRest(${i})">
        <div class="chk-box"><span class="chk-icon">✓</span></div>
        <div class="ex-info"><div class="ex-name">${item}</div></div>
      </div></div>`;
    });
    renderPerfLog(el,data);
    return;
  }

  if(def.recovery){
    el.innerHTML+=`<div class="sec-lbl">Choose 1–2 Activities</div>`;
    def.recovery.forEach((item,i)=>{
      const chk=!!data.recovery[i];
      el.innerHTML+=`<div class="ex-row${chk?' checked':''}"><div class="ex-top" onclick="toggleRecovery(${i})">
        <div class="chk-box"><span class="chk-icon">✓</span></div>
        <div class="ex-info">
          <div class="ex-name">${item.label}</div>
          <div class="ex-detail">${item.detail}</div>
        </div>
      </div></div>`;
    });
    renderPerfLog(el,data);
    return;
  }

  // ENERGY
  const eMap={low:['rgba(255,71,87,.15)','#ff4757'],medium:['rgba(255,107,53,.15)','#ff6b35'],high:['rgba(232,255,71,.15)','#e8ff47']};
  el.innerHTML+=`<div style="margin-top:14px">
    <div class="energy-lbl">Today's Energy</div>
    <div class="energy-bar">
      ${['low','medium','high'].map(v=>{
        const sel=data.energy===v, [bg,col]=eMap[v];
        return `<button class="energy-btn" style="${sel?`background:${bg};border-color:${col};color:${col}`:''}" onclick="setEnergy('${v}')">${v==='low'?'🔴 Low':v==='medium'?'🟠 Medium':'🟢 High'}</button>`;
      }).join('')}
    </div>
  </div>`;

  // DUMBBELL LEGEND
  el.innerHTML+=`<div class="sec-lbl">Your Dumbbells</div>
  <div class="db-legend">
    ${DUMBBELLS.map(w=>`<div class="db-card"><div class="db-w">${w}</div><div class="db-u">lb</div></div>`).join('')}
  </div>`;

  // BAND LEGEND
  el.innerHTML+=`<div class="sec-lbl">Loop Band Guide</div>
  <div class="band-legend">
    <div class="band-row"><div class="band-dot" style="background:#a8e063"></div>
      <div class="band-info"><div class="band-name">X-Light</div><div class="band-use">Warm-ups, mobility only.</div></div></div>
    <div class="band-row"><div class="band-dot" style="background:#f7dc6f"></div>
      <div class="band-info"><div class="band-name">Light</div><div class="band-use">Triceps work, light activation.</div></div></div>
    <div class="band-row"><div class="band-dot" style="background:#e67e22"></div>
      <div class="band-info"><div class="band-name">Medium — Main Workhorse</div><div class="band-use">Squats, lateral walks, lat pulldowns.</div></div></div>
    <div class="band-row"><div class="band-dot" style="background:#e74c3c"></div>
      <div class="band-info"><div class="band-name">Heavy — Glute Builder</div><div class="band-use">Hip thrusts, advanced lateral walks.</div></div></div>
    <div class="band-row"><div class="band-dot" style="background:#8e44ad"></div>
      <div class="band-info"><div class="band-name">X-Heavy — Advanced</div><div class="band-use">Hip thrusts in weeks 5–8 once Heavy is easy.</div></div></div>
  </div>`;

  // SECTIONS
  const sections = getAllSections(def, ST.week);
  sections.forEach(sec=>{
    el.innerHTML+=`<div class="sec-lbl">${sec.name}</div>`;
    sec.exercises.forEach(ex=>{
      const chk=!!data.exercises[ex.name], sc=data.sets[ex.name]||0;
      const uid='ex_'+ex.name.replace(/\W/g,'_');
      let dots='';
      if(ex.sets>0){
        dots='<div class="set-dots">';
        for(let s=0;s<ex.sets;s++) dots+=`<div class="set-dot${s<sc?' done':''}" onclick="event.stopPropagation();toggleSet('${ex.name}',${s},${ex.sets})"></div>`;
        dots+='</div>';
      }

      const isNewThisWeek = (ST.week===3 || ST.week===7) && (def.blockB||[]).includes(ex);

      let weightLogHtml = '';
      if (ex.trackWeight) {
        const currentWeight = data.weights[ex.name] != null ? data.weights[ex.name] : null;
        const lastInfo = getLastWeight(ex.name, ST.week, ST.day);
        const suggested = getSuggestedWeight(ex.name, ST.week, ST.day, ex.startWeight);
        const displayWeight = currentWeight != null ? currentWeight : suggested;

        let trendHtml = '';
        if (!lastInfo) {
          trendHtml = `<span class="weight-trend first">First log</span>`;
        } else if (deload) {
          trendHtml = `<span class="weight-trend deload-trend">⚡ Deload</span>`;
        } else if (displayWeight > lastInfo.weight) {
          trendHtml = `<span class="weight-trend up">↑ +${displayWeight-lastInfo.weight}lb</span>`;
        } else if (displayWeight === lastInfo.weight) {
          trendHtml = `<span class="weight-trend same">Same as last</span>`;
        } else {
          trendHtml = `<span class="weight-trend deload-trend">↓ ${lastInfo.weight-displayWeight}lb</span>`;
        }

        let suggestRow = '';
        if (currentWeight == null && lastInfo) {
          if (deload) {
            suggestRow = `<div class="weight-suggest-row">⚡ Suggested deload weight: <strong>${suggested}lb</strong> (~70–75% of last)</div>`;
          } else if (DELOAD_WEEKS.includes(lastInfo.week) && !deload) {
            suggestRow = `<div class="weight-suggest-row">📈 Ramping back up from deload — suggested: <strong>${suggested}lb</strong></div>`;
          }
        }

        weightLogHtml = `<div class="weight-log" onclick="event.stopPropagation()">
          <div class="weight-log-hdr">
            <div class="weight-log-lbl">Weight Used</div>
            ${trendHtml}
          </div>
          <div class="weight-input-row">
            <div class="weight-stepper">
              <button class="weight-step-btn" onclick="adjustWeight('${ex.name}',-1)">−</button>
              <div class="weight-val-box">${displayWeight}</div>
              <button class="weight-step-btn" onclick="adjustWeight('${ex.name}',1)">+</button>
            </div>
            <div class="weight-unit">lb / hand</div>
            ${lastInfo!=null?`<div class="weight-last">Last: ${lastInfo.weight}lb</div>`:''}
          </div>
          ${suggestRow}
        </div>`;
      }

      el.innerHTML+=`<div class="ex-row${chk?' checked':''}${deload?' deload-row':''}">
        <div class="ex-top" onclick="toggleExercise('${ex.name}',${ex.sets})">
          <div class="chk-box"><span class="chk-icon">✓</span></div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}${isNewThisWeek?'<span class="ex-new-badge">NEW</span>':''}</div>
            <div class="ex-meta">${ex.meta}</div>
            <button class="howto-btn" onclick="event.stopPropagation();toggleHow('${uid}')">▸ How to do it</button>
          </div>
          ${dots}
        </div>
        <div class="howto-panel" id="${uid}">
          <p>${ex.how}</p>
          <div class="feel">✓ <strong>You should feel:</strong> ${ex.feel}</div>
          ${ex.band?`<div class="band-note">🔵 <strong>Band:</strong> ${ex.band}</div>`:''}
          ${ex.bench?`<div class="bench-note">🟠 <strong>Bench setup:</strong> ${ex.bench}</div>`:''}
        </div>
        ${weightLogHtml}
      </div>`;
    });
  });

  if(def.cardio){
    el.innerHTML+=`<div class="sec-lbl">Cardio Finisher</div>
    <div class="cardio-row" onclick="toggleCardio()">
      <div>
        <div class="cardio-lbl">${def.cardio.label}</div>
        <div class="cardio-sub">${def.cardio.detail}</div>
      </div>
      <div class="cardio-chk${data.cardio?' done':''}">
        ${data.cardio?'<span style="color:#0d0d0f;font-size:13px;font-weight:900">✓</span>':''}
      </div>
    </div>`;
  }

  el.innerHTML+=`<div class="tip-box">📈 <strong>Week ${ST.week} Focus:</strong> ${WEEK_TIPS[ST.week]}</div>`;

  renderPerfLog(el,data);
}

function renderPerfLog(el,data){
  el.innerHTML+=`<div class="sec-lbl">Performance Log</div>
  <div class="perf-box">
    <div class="perf-row">
      <div class="perf-key">Difficulty</div>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="range" class="diff-slider" min="1" max="10" value="${data.difficulty||5}" oninput="setDifficulty(this.value)">
        <div class="diff-val" id="diff-val">${data.difficulty||5}</div>
      </div>
    </div>
    <div class="perf-row">
      <div class="perf-key">Last Sets</div>
      <div class="effort-btns">
        ${[['easy','Easy'],['hard','Hard'],['failure','Near Failure ⚡']].map(([v,l])=>
          `<button class="effort-btn${data.effort===v?' sel':''}" onclick="setEffort('${v}')">${l}</button>`
        ).join('')}
      </div>
    </div>
    <input type="text" class="win-input" placeholder="⚡ Win of the day (stronger / sweaty / pumped...)" value="${data.win||''}" oninput="setWin(this.value)">
  </div>`;
}

// ─── WEIGHT PROGRESS MODAL ──────────────────────────────────────────
function openProgress() {
  const def = DAYS[ST.day-1];
  const body = document.getElementById('progress-body');
  body.innerHTML = '';

  // collect every unique tracked exercise name that has ever appeared on this day (across both blocks)
  const namesSeen = new Set();
  const exMap = {}; // name -> exercise def (first one found)
  [1,2,3,4,5,6,7,8].forEach(w=>{
    getDayExercises(def, w).forEach(ex=>{
      if (ex.trackWeight && !namesSeen.has(ex.name)) { namesSeen.add(ex.name); exMap[ex.name]=ex; }
    });
  });

  if (namesSeen.size === 0) {
    body.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0">No weight-tracked exercises on this day.</div>';
  } else {
    Array.from(namesSeen).forEach(name => {
      const ex = exMap[name];
      const weeklyWeights = [];
      for (let w = 1; w <= 8; w++) {
        const data = ST.weeks[getKey(w, ST.day)];
        const wt = data && data.weights ? data.weights[name] : null;
        weeklyWeights.push(wt);
      }
      const loggedVals = weeklyWeights.filter(v => v != null);
      const maxW = loggedVals.length ? Math.max(...loggedVals, ex.startWeight) : ex.startWeight;
      const firstLogged = loggedVals[0];
      const lastLogged = loggedVals[loggedVals.length - 1];
      const gain = (firstLogged != null && lastLogged != null) ? lastLogged - firstLogged : null;

      let bars = '';
      weeklyWeights.forEach((wt, i) => {
        const wkNum = i+1;
        const isDel = isDeloadWeek(wkNum);
        const h = wt != null ? Math.max(8, (wt / maxW) * 56) : 4;
        bars += `<div class="ex-progress-bar${wt!=null?' has-data':''}${isDel?' deload-bar':''}" style="height:${h}px" title="Week ${wkNum}: ${wt!=null?wt+'lb':'—'}"></div>`;
      });
      let labels = weeklyWeights.map((_,i)=>`<span>${i+1}</span>`).join('');

      body.innerHTML += `<div class="ex-progress-card">
        <div class="ex-progress-name">${name}</div>
        <div class="ex-progress-chart">${bars}</div>
        <div class="ex-progress-labels">${labels}</div>
        ${gain != null ? `<div class="ex-progress-summary">${gain > 0 ? `<strong>+${gain}lb</strong> since first logged` : gain === 0 ? 'Holding steady' : `<strong>${gain}lb</strong> since first logged (normal if this includes a deload week)`}</div>` : `<div class="ex-progress-summary">Log a weight to start tracking</div>`}
      </div>`;
    });
  }

  document.getElementById('progress-modal').classList.add('open');
}
function closeProgress() {
  document.getElementById('progress-modal').classList.remove('open');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────
function toggleHow(uid){
  const p=document.getElementById(uid);
  p.classList.toggle('open');
  const btn=p.parentElement.querySelector('.howto-btn');
  if(btn) btn.textContent = p.classList.contains('open') ? '▾ How to do it' : '▸ How to do it';
}
function toggleExercise(name,sets){
  const d=getDayData(ST.week,ST.day);
  d.exercises[name]=!d.exercises[name];
  if(sets>0) d.sets[name]=d.exercises[name]?sets:0;
  save(); render();
  if(d.exercises[name]&&isDayComplete(ST.week,ST.day)) showToast('Day '+ST.day+' complete! 💪');
}
function toggleSet(name,idx,total){
  const d=getDayData(ST.week,ST.day);
  const curr=d.sets[name]||0;
  d.sets[name]=idx<curr?idx:idx+1;
  d.exercises[name]=d.sets[name]>=total;
  save(); render();
}
function toggleRest(idx){ const d=getDayData(ST.week,ST.day); d.restChecks[idx]=!d.restChecks[idx]; save(); render(); }
function toggleRecovery(idx){ const d=getDayData(ST.week,ST.day); d.recovery[idx]=!d.recovery[idx]; save(); render(); }
function toggleCardio(){ const d=getDayData(ST.week,ST.day); d.cardio=!d.cardio; save(); render(); if(d.cardio) showToast('Cardio done! 🔥'); }
function setEnergy(v){ getDayData(ST.week,ST.day).energy=v; save(); render(); }
function setDifficulty(v){ getDayData(ST.week,ST.day).difficulty=parseInt(v); document.getElementById('diff-val').textContent=v; save(); }
function setEffort(v){ getDayData(ST.week,ST.day).effort=v; save(); render(); }
function setWin(v){ getDayData(ST.week,ST.day).win=v; save(); }

function adjustWeight(name, direction) {
  const d = getDayData(ST.week, ST.day);
  const def = DAYS[ST.day-1];
  const allEx = getDayExercises(def, ST.week).concat(def.warmup||[]);
  const ex = allEx.find(e=>e.name===name);
  const suggested = getSuggestedWeight(name, ST.week, ST.day, ex.startWeight);
  const current = d.weights[name] != null ? d.weights[name] : suggested;
  // step through actual dumbbell sizes you own; direction is +1 or -1
  const idx = DUMBBELLS.indexOf(current);
  let next;
  if (idx === -1) {
    // current value isn't an exact dumbbell size (e.g. a deload-rounded number) -- snap to nearest, then step
    let nearestIdx = 0, nearestDiff = Infinity;
    DUMBBELLS.forEach((w,i)=>{ const diff=Math.abs(w-current); if(diff<nearestDiff){nearestDiff=diff;nearestIdx=i;} });
    next = DUMBBELLS[Math.max(0, Math.min(DUMBBELLS.length-1, nearestIdx + (direction>0?0:-1)))];
  } else {
    const newIdx = Math.max(0, Math.min(DUMBBELLS.length-1, idx + direction));
    next = DUMBBELLS[newIdx];
  }
  d.weights[name] = next;
  save(); render();
}

// ─── NAV ─────────────────────────────────────────────────────────────
document.getElementById('btn-nd').onclick=()=>{
  if(ST.day<7) ST.day++; else if(ST.week<8){ST.week++;ST.day=1;}
  save(); render(); window.scrollTo({top:0,behavior:'smooth'});
};
document.getElementById('btn-pd').onclick=()=>{
  if(ST.day>1) ST.day--; else if(ST.week>1){ST.week--;ST.day=7;}
  save(); render(); window.scrollTo({top:0,behavior:'smooth'});
};
document.getElementById('btn-pw').onclick=()=>{ if(ST.week>1){ST.week--;ST.day=1;save();render();} };
document.getElementById('btn-nw').onclick=()=>{ if(ST.week<8){ST.week++;ST.day=1;save();render();} };

render();
</script>
