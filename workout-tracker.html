<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recomp Rebuild Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #151518;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --accent3: #47d4ff;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --danger: #ff4757;
    --success: #2ecc71;
    --week-h: 56px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .week-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }
  .week-badge span { color: var(--text); }

  /* ── WEEK SELECTOR ── */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .week-dots {
    display: flex;
    gap: 6px;
  }
  .week-dot {
    width: 28px;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .week-dot.active { background: var(--accent); }
  .week-dot.done { background: var(--success); opacity: 0.7; }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── DAY PILLS ── */
  .day-scroll {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .day-scroll::-webkit-scrollbar { display: none; }
  .day-pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .day-pill.active {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
  }
  .day-pill.done {
    border-color: var(--success);
    color: var(--success);
  }
  .day-pill.rest {
    border-style: dashed;
  }

  /* ── CONTENT ── */
  .content { padding: 0 20px 100px; }

  .day-header {
    padding: 20px 0 6px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .day-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }
  .day-progress-ring {
    flex-shrink: 0;
    position: relative;
    width: 52px;
    height: 52px;
  }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .ring-fg { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── ENERGY ── */
  .energy-bar {
    display: flex;
    gap: 8px;
    margin: 12px 0 18px;
  }
  .energy-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .energy-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .energy-btn.sel-low { background: rgba(255,71,87,0.15); border-color: var(--danger); color: var(--danger); }
  .energy-btn.sel-medium { background: rgba(255,107,53,0.15); border-color: var(--accent2); color: var(--accent2); }
  .energy-btn.sel-high { background: rgba(232,255,71,0.15); border-color: var(--accent); color: var(--accent); }

  /* ── SECTION ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── EXERCISE ROW ── */
  .exercise-list { display: flex; flex-direction: column; gap: 6px; }
  .exercise-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .exercise-row.checked {
    background: rgba(232,255,71,0.06);
    border-color: rgba(232,255,71,0.3);
  }
  .exercise-row:active { transform: scale(0.98); }
  .check-box {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .exercise-row.checked .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-icon { display: none; font-size: 13px; color: #0d0d0f; font-weight: 900; }
  .exercise-row.checked .check-icon { display: block; }
  .ex-info { flex: 1; }
  .ex-name {
    font-size: 15px;
    font-weight: 500;
    transition: color 0.15s;
  }
  .exercise-row.checked .ex-name {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(232,255,71,0.4);
  }
  .ex-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 300;
  }
  .ex-sets {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .set-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .set-dot.done { background: var(--accent); }

  /* ── CARDIO ROW ── */
  .cardio-row {
    padding: 12px 14px;
    background: var(--surface);
    border: 1.5px solid var(--accent3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .cardio-label { font-size: 14px; font-weight: 500; color: var(--accent3); }
  .cardio-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cardio-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--accent3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .cardio-check.done { background: var(--accent3); }
  .cardio-check.done::after { content: '✓'; color: #0d0d0f; font-size: 13px; font-weight: 900; }

  /* ── PERFORMANCE LOG ── */
  .perf-log {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 8px;
  }
  .perf-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .perf-row:last-child { margin-bottom: 0; }
  .perf-key {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .difficulty-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .difficulty-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 4px rgba(232,255,71,0.15);
  }
  .diff-val {
    font-size: 18px;
    font-family: 'Bebas Neue', sans-serif;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }
  .effort-btns { display: flex; gap: 6px; }
  .effort-btn {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .effort-btn.sel { background: rgba(232,255,71,0.15); border-color: var(--accent); color: var(--accent); }
  .win-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    width: 100%;
    margin-top: 10px;
    outline: none;
  }
  .win-input:focus { border-color: var(--accent); }
  .win-input::placeholder { color: var(--muted); }

  /* ── REST DAY ── */
  .rest-card {
    margin-top: 24px;
    padding: 32px 20px;
    text-align: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
  }
  .rest-icon { font-size: 48px; margin-bottom: 12px; }
  .rest-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--muted); }
  .rest-sub { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    padding: 12px 20px 20px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    display: flex;
    gap: 10px;
  }
  .btn-primary {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    background: var(--accent);
    color: #0d0d0f;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary {
    padding: 14px 18px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:active { border-color: var(--accent); }

  /* ── WEEK COMPLETE BANNER ── */
  .week-complete {
    background: rgba(46,204,113,0.1);
    border: 1.5px solid var(--success);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 16px 0 0;
    display: flex;
    align-items: center;
    gap: 12px;
    display: none;
  }
  .week-complete.show { display: flex; }
  .wc-icon { font-size: 24px; }
  .wc-text { font-size: 13px; color: var(--success); font-weight: 600; }
  .wc-sub { font-size: 12px; color: var(--muted); font-weight: 300; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── PROGRESS OVERVIEW ── */
  .overview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0 0;
  }
  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* progress bar */
  .prog-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; margin-top: 10px; overflow: hidden; }
  .prog-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }

  /* note tip */
  .tip-box {
    background: rgba(71,212,255,0.07);
    border: 1px solid rgba(71,212,255,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent3);
    margin-top: 12px;
    line-height: 1.6;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="app-header">
  <div class="app-title">RECOMP&nbsp;REBUILD</div>
  <div class="week-badge">Week <span id="hdr-week">1</span> of 8</div>
</div>

<!-- WEEK NAV -->
<div class="week-nav">
  <button class="nav-btn" id="prev-week">‹</button>
  <div class="week-dots" id="week-dots"></div>
  <button class="nav-btn" id="next-week">›</button>
</div>

<!-- DAY PILLS -->
<div class="day-scroll" id="day-pills"></div>

<!-- MAIN CONTENT -->
<div class="content" id="main-content"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn-secondary" id="btn-prev-day">← Back</button>
  <button class="btn-primary" id="btn-next-day">Next Day →</button>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const DAYS = [
  {
    id: 1,
    label: 'Day 1',
    title: 'LOWER\nBODY',
    subtitle: 'Glutes + Legs',
    color: '#e8ff47',
    sections: [
      {
        name: 'Warm-Up',
        exercises: [
          { name: 'Vibration Plate', detail: '5 min', sets: 0 }
        ]
      },
      {
        name: 'Main Work',
        exercises: [
          { name: 'Goblet Squat', detail: '4×12–15 · 3s down / 1s hold · 8lb + med band', sets: 4 },
          { name: 'Hip Thrust (Bench)', detail: '4×15–20 · 2s squeeze at top · 8lb + heavy band', sets: 4 },
          { name: 'Reverse Lunges', detail: '3×10 each leg · 5–8lb · controlled 2–3s down', sets: 3 },
          { name: 'Romanian Deadlift', detail: '3×12–15 · 8lb · hips push back, DBs stay close', sets: 3 },
          { name: 'Band Side Steps', detail: '3×15 each way · med/heavy band · stay low', sets: 3 },
          { name: 'Calf Raises', detail: '3×20 · 2s hold at top', sets: 3 }
        ]
      }
    ],
    cardio: { label: 'Treadmill Incline Walk', detail: '10–15 min · incline 8–12' }
  },
  {
    id: 2,
    label: 'Day 2',
    title: 'PUSH',
    subtitle: 'Chest / Shoulders / Triceps',
    color: '#ff6b35',
    sections: [
      {
        name: 'Main Work',
        exercises: [
          { name: 'Flat Bench DB Press', detail: '4×12–15 · 8lb · chest stretch at bottom, 3s down', sets: 4 },
          { name: 'Shoulder Press', detail: '3×10–12 · 5–8lb · seated, core tight, no leaning', sets: 3 },
          { name: 'Push-ups', detail: '3×near failure · incline or floor · last reps slow & shaky', sets: 3 },
          { name: 'Lateral Raises', detail: '3×15–20 · 5lb ONLY · cannot swing at all', sets: 3 },
          { name: 'Band Triceps Extensions', detail: '3×15–20 · medium band · elbows locked in place', sets: 3 }
        ]
      }
    ],
    cardio: { label: 'Incline Walk', detail: '15 min' }
  },
  {
    id: 3,
    label: 'Day 3',
    title: 'RECOVERY',
    subtitle: 'Cardio + Rest',
    color: '#47d4ff',
    rest: false,
    sections: [],
    cardio: null,
    recovery: [
      { label: '🚴 Bike', detail: '25–30 min steady' },
      { label: '🚶 Treadmill Incline Walk', detail: '30–40 min' },
      { label: '🚣 Row Machine', detail: '15–20 min easy' },
      { label: '🟣 Vibration Plate (optional)', detail: '5–10 min' },
      { label: 'Stretch', detail: 'Hips, hamstrings, chest — 5–10 min' }
    ]
  },
  {
    id: 4,
    label: 'Day 4',
    title: 'PULL',
    subtitle: 'Back + Biceps',
    color: '#e8ff47',
    sections: [
      {
        name: 'Main Work',
        exercises: [
          { name: 'Chest-Supported DB Row', detail: '4×12–15 · 8lb · chest on bench, squeeze shoulder blades', sets: 4 },
          { name: 'Reverse Flys', detail: '3×15 · 5lb or band · chest on bench, slow raise', sets: 3 },
          { name: 'Bicep Curls', detail: '3×12–15 · 5–8lb · 3s eccentric (slow down)', sets: 3 },
          { name: 'Band Lat Pulldown', detail: '3×12–15 · medium band · elbows drive down into ribs', sets: 3 }
        ]
      }
    ],
    cardio: { label: 'Row Machine', detail: '10–15 min moderate' }
  },
  {
    id: 5,
    label: 'Day 5',
    title: 'FULL\nBODY',
    subtitle: 'Rebuild Circuit',
    color: '#ff6b35',
    sections: [
      {
        name: 'Warm-Up',
        exercises: [
          { name: 'Vibration Plate', detail: '5 min', sets: 0 }
        ]
      },
      {
        name: 'Circuit · 3–4 Rounds · Rest 60–90s between',
        exercises: [
          { name: 'Goblet Squat (banded)', detail: '12 reps · 8lb + med band', sets: 0 },
          { name: 'Bench DB Press', detail: '10–12 reps · 8lb', sets: 0 },
          { name: 'Chest-Supported Row', detail: '12–15 reps · 8lb · strict form', sets: 0 },
          { name: 'Hip Thrust (Bench)', detail: '15–20 reps · 8lb + heavy band · 2s squeeze', sets: 0 },
          { name: 'Plank', detail: '30–45 sec · core braced', sets: 0 }
        ]
      }
    ],
    cardio: { label: 'Treadmill Incline Walk', detail: '10–15 min' },
    circuitRounds: { current: 0, target: 3 }
  },
  {
    id: 6,
    label: 'Day 6',
    title: 'CONDITION\nING',
    subtitle: 'Cardio + Core',
    color: '#47d4ff',
    sections: [
      {
        name: 'Core Circuit · 3 Rounds',
        exercises: [
          { name: 'Plank', detail: '30–45 sec', sets: 3 },
          { name: 'Dead Bug', detail: '10 each side', sets: 3 },
          { name: 'Bicycle Crunch', detail: '12–15 reps', sets: 3 },
          { name: 'Side Plank', detail: '20–30 sec each side', sets: 3 }
        ]
      }
    ],
    cardio: { label: 'Bike / Row / Walk', detail: '25–35 min steady state' }
  },
  {
    id: 7,
    label: 'Day 7',
    title: 'REST',
    subtitle: 'Recover & Refuel',
    color: '#6b6b7a',
    rest: true,
    sections: [],
    restChecks: [
      '🚶 Light walk',
      '🧘 Stretch (hips, hamstrings, chest)',
      '🥩 Hit protein goal (160–180g)',
      '💧 Stay hydrated'
    ]
  }
];

// ─────────────────────────────────────────
// STATE & STORAGE
// ─────────────────────────────────────────
const SK = 'recomp_v2';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    week: 1,
    day: 1,
    weeks: {}
  };
}

function save() {
  localStorage.setItem(SK, JSON.stringify(state));
}

function getKey(week, day) { return `w${week}d${day}`; }

function getDayData(week, day) {
  const k = getKey(week, day);
  if (!state.weeks[k]) {
    state.weeks[k] = {
      exercises: {},
      sets: {},
      energy: null,
      difficulty: 5,
      effort: null,
      win: '',
      cardio: false,
      restChecks: {},
      recovery: {}
    };
  }
  return state.weeks[k];
}

function isDayComplete(week, day) {
  const def = DAYS[day - 1];
  const data = getDayData(week, day);
  if (def.rest) return Object.values(data.restChecks).filter(Boolean).length >= (def.restChecks?.length || 0);
  let total = 0, done = 0;
  def.sections.forEach(s => s.exercises.forEach(e => {
    if (e.name === 'Vibration Plate') return;
    total++;
    if (data.exercises[e.name]) done++;
  }));
  return total > 0 && done === total;
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  renderWeekDots();
  renderDayPills();
  renderContent();
  document.getElementById('hdr-week').textContent = state.week;
  document.getElementById('prev-week').disabled = state.week === 1;
  document.getElementById('next-week').disabled = state.week === 8;
}

function renderWeekDots() {
  const el = document.getElementById('week-dots');
  el.innerHTML = '';
  for (let w = 1; w <= 8; w++) {
    const d = document.createElement('div');
    d.className = 'week-dot';
    if (w === state.week) d.classList.add('active');
    else {
      // check if all 7 days done
      const allDone = [1,2,3,4,5,6,7].every(day => isDayComplete(w, day));
      if (allDone) d.classList.add('done');
    }
    d.onclick = () => { state.week = w; state.day = 1; save(); render(); };
    el.appendChild(d);
  }
}

function renderDayPills() {
  const el = document.getElementById('day-pills');
  el.innerHTML = '';
  DAYS.forEach((def, i) => {
    const day = i + 1;
    const p = document.createElement('div');
    p.className = 'day-pill';
    if (def.rest) p.classList.add('rest');
    if (day === state.day) p.classList.add('active');
    else if (isDayComplete(state.week, day)) p.classList.add('done');
    p.textContent = def.label + (isDayComplete(state.week, day) && day !== state.day ? ' ✓' : '');
    p.onclick = () => { state.day = day; save(); render(); scrollToTop(); };
    el.appendChild(p);
  });
  // scroll active into view
  setTimeout(() => {
    const active = el.querySelector('.day-pill.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

function renderContent() {
  const def = DAYS[state.day - 1];
  const data = getDayData(state.week, state.day);
  const el = document.getElementById('main-content');
  el.innerHTML = '';

  // ── Day header with ring
  const allEx = def.sections.flatMap(s => s.exercises.filter(e => e.name !== 'Vibration Plate'));
  const doneEx = allEx.filter(e => data.exercises[e.name]).length;
  const pct = allEx.length ? doneEx / allEx.length : (def.rest ? (Object.values(data.restChecks).filter(Boolean).length / (def.restChecks?.length || 1)) : 0);
  const r = 22, circ = 2 * Math.PI * r;

  el.innerHTML += `
    <div class="day-header">
      <div>
        <div class="day-title" style="color:${def.color}">${def.title.replace('\n','<br>')}</div>
        <div class="day-subtitle">${def.subtitle}</div>
      </div>
      <div class="day-progress-ring">
        <svg class="ring-svg" width="52" height="52" viewBox="0 0 52 52">
          <circle class="ring-bg" cx="26" cy="26" r="${r}"/>
          <circle class="ring-fg" cx="26" cy="26" r="${r}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${circ - pct * circ}"
            stroke="${def.color}"/>
        </svg>
        <div class="ring-text">${Math.round(pct*100)}%</div>
      </div>
    </div>
  `;

  // ── Week progress
  const weekDone = [1,2,3,4,5,6,7].filter(d => isDayComplete(state.week, d)).length;
  el.innerHTML += `
    <div class="overview-grid">
      <div class="stat-card">
        <div class="stat-val">${weekDone}/7</div>
        <div class="stat-label">Week ${state.week} Days</div>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${(weekDone/7)*100}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${def.color}">${doneEx}/${allEx.length || (def.restChecks?.length||0)}</div>
        <div class="stat-label">Today Done</div>
        <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct*100}%;background:${def.color}"></div></div>
      </div>
    </div>
  `;

  // ── REST DAY
  if (def.rest) {
    let html = `<div class="rest-card"><div class="rest-icon">😴</div>
      <div class="rest-title">REST DAY</div>
      <div class="rest-sub">Muscle grows when you rest, not when you train.<br>Today is mandatory.</div></div>
      <div class="section-label" style="margin-top:20px">Rest Day Checklist</div>
      <div class="exercise-list">`;
    def.restChecks.forEach((item, i) => {
      const checked = !!data.restChecks[i];
      html += `<div class="exercise-row ${checked?'checked':''}" onclick="toggleRest(${i})">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <div class="ex-info"><div class="ex-name">${item}</div></div>
      </div>`;
    });
    html += `</div>`;
    el.innerHTML += html;
    renderPerfLog(el, data, def);
    return;
  }

  // ── RECOVERY DAY
  if (def.recovery) {
    el.innerHTML += `<div class="section-label">Choose 1–2 Activities</div><div class="exercise-list">`;
    def.recovery.forEach((item, i) => {
      const checked = !!data.recovery[i];
      el.innerHTML += `<div class="exercise-row ${checked?'checked':''}" onclick="toggleRecovery(${i})">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <div class="ex-info">
          <div class="ex-name">${item.label}</div>
          <div class="ex-detail">${item.detail}</div>
        </div>
      </div>`;
    });
    el.innerHTML += `</div>`;
    renderPerfLog(el, data, def);
    return;
  }

  // ── ENERGY
  el.innerHTML += `
    <div style="margin-top:14px">
      <div class="energy-label">Today's Energy</div>
      <div class="energy-bar">
        <div class="energy-btn ${data.energy==='low'?'sel-low':''}" onclick="setEnergy('low')">🔴 Low</div>
        <div class="energy-btn ${data.energy==='medium'?'sel-medium':''}" onclick="setEnergy('medium')">🟠 Medium</div>
        <div class="energy-btn ${data.energy==='high'?'sel-high':''}" onclick="setEnergy('high')">🟢 High</div>
      </div>
    </div>
  `;

  // ── EXERCISES
  def.sections.forEach(sec => {
    el.innerHTML += `<div class="section-label">${sec.name}</div><div class="exercise-list" id="sec-${sec.name.replace(/\s/g,'_')}">`;
    sec.exercises.forEach(ex => {
      const checked = !!data.exercises[ex.name];
      const setsData = data.sets[ex.name] || 0;
      let setsHtml = '';
      if (ex.sets > 0) {
        setsHtml = '<div class="ex-sets">';
        for (let s = 0; s < ex.sets; s++) {
          setsHtml += `<div class="set-dot ${s < setsData ? 'done' : ''}" onclick="event.stopPropagation();toggleSet('${ex.name}',${s},${ex.sets})"></div>`;
        }
        setsHtml += '</div>';
      }
      el.innerHTML += `<div class="exercise-row ${checked?'checked':''}" id="ex-${CSS.escape(ex.name)}" onclick="toggleExercise('${ex.name}')">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail">${ex.detail}</div>
        </div>
        ${setsHtml}
      </div>`;
    });
    el.innerHTML += '</div>';
  });

  // ── CARDIO
  if (def.cardio) {
    el.innerHTML += `<div class="section-label">Cardio Finisher</div>
      <div class="cardio-row" onclick="toggleCardio()">
        <div>
          <div class="cardio-label">${def.cardio.label}</div>
          <div class="cardio-sub">${def.cardio.detail}</div>
        </div>
        <div class="cardio-check ${data.cardio?'done':''}"></div>
      </div>`;
  }

  // ── PROGRESSION TIP
  const weekTips = ['Learn tempo & establish mind-muscle connection','Add 1 extra set to main lifts · slow reps more','Add band tension OR reduce rest time · push to failure','Add burnout sets — last set goes to near failure + pulses'];
  const tipIdx = Math.min(Math.floor((state.week - 1) / 2), 3);
  el.innerHTML += `<div class="tip-box">📈 <strong>Week ${state.week} Focus:</strong> ${weekTips[tipIdx]}</div>`;

  // ── PERFORMANCE LOG
  renderPerfLog(el, data, def);
}

function renderPerfLog(el, data, def) {
  const perfHtml = `
    <div class="section-label">Performance Log</div>
    <div class="perf-log">
      <div class="perf-row">
        <div class="perf-key">Difficulty</div>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" class="difficulty-slider" min="1" max="10" value="${data.difficulty||5}" oninput="setDifficulty(this.value)">
          <div class="diff-val" id="diff-val">${data.difficulty||5}</div>
        </div>
      </div>
      <div class="perf-row">
        <div class="perf-key">Last Sets</div>
        <div class="effort-btns">
          <div class="effort-btn ${data.effort==='easy'?'sel':''}" onclick="setEffort('easy')">Easy</div>
          <div class="effort-btn ${data.effort==='hard'?'sel':''}" onclick="setEffort('hard')">Hard</div>
          <div class="effort-btn ${data.effort==='failure'?'sel':''}" onclick="setEffort('failure')">Near Failure ⚡</div>
        </div>
      </div>
      <input type="text" class="win-input" placeholder="⚡ Win of the day (stronger / sweaty / pumped...)" value="${data.win||''}" oninput="setWin(this.value)" onblur="setWin(this.value)">
    </div>
  `;
  el.innerHTML += perfHtml;
}

// ─────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────
function toggleExercise(name) {
  const data = getDayData(state.week, state.day);
  data.exercises[name] = !data.exercises[name];
  // auto-fill sets if toggling on
  const def = DAYS[state.day - 1];
  const exDef = def.sections.flatMap(s => s.exercises).find(e => e.name === name);
  if (data.exercises[name] && exDef?.sets > 0) {
    data.sets[name] = exDef.sets;
  } else if (!data.exercises[name] && exDef?.sets > 0) {
    data.sets[name] = 0;
  }
  save();
  render();
  if (data.exercises[name]) checkAllDone();
}

function toggleSet(name, idx, total) {
  const data = getDayData(state.week, state.day);
  const curr = data.sets[name] || 0;
  // clicking a done dot = go back, undone = go forward
  if (idx < curr) {
    data.sets[name] = idx;
  } else {
    data.sets[name] = idx + 1;
  }
  // auto-check if all sets done
  if (data.sets[name] >= total) data.exercises[name] = true;
  else data.exercises[name] = false;
  save();
  render();
}

function toggleRest(idx) {
  const data = getDayData(state.week, state.day);
  data.restChecks[idx] = !data.restChecks[idx];
  save();
  render();
}

function toggleRecovery(idx) {
  const data = getDayData(state.week, state.day);
  data.recovery[idx] = !data.recovery[idx];
  save();
  render();
}

function toggleCardio() {
  const data = getDayData(state.week, state.day);
  data.cardio = !data.cardio;
  save();
  render();
  if (data.cardio) showToast('Cardio done! 🔥');
}

function setEnergy(val) {
  getDayData(state.week, state.day).energy = val;
  save();
  render();
}

function setDifficulty(val) {
  getDayData(state.week, state.day).difficulty = parseInt(val);
  document.getElementById('diff-val').textContent = val;
  save();
}

function setEffort(val) {
  getDayData(state.week, state.day).effort = val;
  save();
  render();
}

function setWin(val) {
  getDayData(state.week, state.day).win = val;
  save();
}

function checkAllDone() {
  if (isDayComplete(state.week, state.day)) {
    showToast('Day ' + state.day + ' complete! 💪');
  }
}

// ─────────────────────────────────────────
// NAV
// ─────────────────────────────────────────
document.getElementById('btn-next-day').onclick = () => {
  if (state.day < 7) {
    state.day++;
  } else if (state.week < 8) {
    state.week++;
    state.day = 1;
  }
  save();
  render();
  scrollToTop();
};

document.getElementById('btn-prev-day').onclick = () => {
  if (state.day > 1) {
    state.day--;
  } else if (state.week > 1) {
    state.week--;
    state.day = 7;
  }
  save();
  render();
  scrollToTop();
};

document.getElementById('prev-week').onclick = () => {
  if (state.week > 1) { state.week--; state.day = 1; save(); render(); }
};
document.getElementById('next-week').onclick = () => {
  if (state.week < 8) { state.week++; state.day = 1; save(); render(); }
};

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
render();
</script>
</body>
</html>
